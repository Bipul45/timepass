<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Do You Love Me ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Center */
.container {
    text-align: center;
}

/* Text */
h1 {
    font-size: 28px;
    color: darkred;
    text-shadow: 2px 2px 8px red;
}

/* Buttons */
button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 25px;
    margin: 10px;
    cursor: pointer;
}

#yes {
    background: pink;
}

#no {
    background: lightgray;
    position: absolute;
}

/* Heart */
.heart {
    font-size: 90px;
    animation: spin 2s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.3); }
    100% { transform: rotate(360deg) scale(1); }
}

/* Final */
.final {
    font-size: 24px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- 🎵 Music -->
<audio id="bgMusic" src="love.mp3" loop></audio>

<div class="container" id="main">

    <!-- GIF -->
    <img src="bear.gif" width="180">

    <h1>Do you love me? ❤️</h1>

    <button id="yes">Yes</button>
    <button id="no">No</button>

</div>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const music = document.getElementById("bgMusic");

/* First click pe music start (mobile fix) */
document.body.addEventListener("click", () => {
    music.play();
}, { once: true });

/* No button bhaage */
function moveButton() {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

/* YES click */
yesBtn.addEventListener("click", () => {

    music.currentTime = 0;
    music.play();

    document.body.innerHTML = `
        <div style="display:flex; justify-content:center; align-items:center; height:100vh;">
            <div class="heart">❤️</div>
        </div>
    `;

    setTimeout(() => {
        document.body.innerHTML = `
            <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh;">
                <img src="final.gif" width="180">
                <div class="final">𝑨𝒋𝒊𝒊 𝒎𝒆𝒓𝒌𝒐 𝒑𝒕𝒂 𝒕𝒉𝒂 💕</div>
            </div>
        `;
    }, 2000);

});

</script>

</body>
</html>
